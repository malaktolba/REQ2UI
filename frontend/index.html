<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06b6d4" />

    <!-- Resolve theme before first paint to avoid a flash of the wrong theme.
         Explicit choice in localStorage wins; otherwise follow the OS. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("req2ui-theme");
          var light =
            v === "light" ||
            (v == null &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches);
          if (light) {
            document.documentElement.classList.add("light");
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#f5f8fc");
          }
        } catch (e) {}
      })();
    </script>

    <!-- Type system: Archivo (display) · IBM Plex Sans (body) · IBM Plex Mono (IDs/labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Primary meta -->
    <title>Req2UI — Requirements to a full SRS &amp; live UI in minutes</title>
    <meta
      name="description"
      content="Req2UI turns a plain-English project description into a complete IEEE 830 SRS — functional, non-functional and security requirements, test cases, UML diagrams, a traceability matrix, and live UI code. Export-ready as PDF, DOCX, CSV, or LaTeX."
    />
    <meta name="author" content="Req2UI — AASTMT Graduation Project" />
    <meta name="keywords" content="SRS, IEEE 830, requirements engineering, software requirements, UML, test cases, UI generation, AI" />
    <link rel="canonical" href="https://req-2-ui.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Req2UI" />
    <meta property="og:title" content="Req2UI — Requirements to a full SRS &amp; live UI in minutes" />
    <meta
      property="og:description"
      content="Paste a project description. Req2UI runs a 10-stage AI pipeline and delivers a complete SRS document, UML diagrams, test cases, and live UI code — export-ready in minutes."
    />
    <meta property="og:url" content="https://req-2-ui.vercel.app/" />
    <meta property="og:image" content="https://req-2-ui.vercel.app/favicon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Req2UI — Requirements to a full SRS &amp; live UI in minutes" />
    <meta
      name="twitter:description"
      content="Paste a project description. Req2UI runs a 10-stage AI pipeline and delivers a complete SRS document, UML diagrams, test cases, and live UI code."
    />
    <meta name="twitter:image" content="https://req-2-ui.vercel.app/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>Req2UI requires JavaScript to run. Please enable it in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
